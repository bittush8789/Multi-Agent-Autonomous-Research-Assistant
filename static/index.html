<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Research Assistant | AI-Powered Insights</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-group">
                <h1>Research.AI</h1>
                <p style="color: var(--text-muted); margin: 5px 0 0 0;">Next-Gen Multi-Agent Research Platform</p>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                System Operational
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Left: Control Panel -->
            <div class="control-panel">
                <div class="glass-panel">
                    <span class="section-title"><i class="fa-solid fa-magnifying-glass"></i> Research Task</span>
                    <div class="search-input-group">
                        <textarea id="researchQuery" placeholder="What are we researching today?" rows="4"></textarea>
                    </div>
                    <button id="searchBtn" class="primary-btn">
                        <span class="spinner" id="searchSpinner" style="display: none;"></span>
                        <i class="fa-solid fa-bolt" id="searchIcon"></i>
                        Execute Research
                    </button>
                </div>

                <div class="glass-panel upload-card" id="dropZone">
                    <span class="section-title"><i class="fa-solid fa-database"></i> Knowledge Base</span>
                    <div style="padding: 1rem 0;">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; color: var(--accent-primary); margin-bottom: 10px;"></i>
                        <p style="margin: 5px 0;">Index New PDFs</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted)">Drag & drop or click to upload</p>
                    </div>
                    <input type="file" id="pdfInput" hidden multiple accept=".pdf">
                </div>
                
                <div id="uploadStatus"></div>
            </div>

            <!-- Center: Report Viewer -->
            <div class="glass-panel content-panel">
                <div class="report-header">
                    <span class="section-title">Research Report</span>
                    <button class="glass-btn" style="background: none; border: 1px solid var(--border-color); color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">
                        <i class="fa-solid fa-download"></i> Export
                    </button>
                </div>
                <div id="reportContent" class="markdown-body">
                    <div style="text-align: center; padding-top: 100px; color: var(--text-muted);">
                        <i class="fa-solid fa-scroll" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.3;"></i>
                        <p>Awaiting research execution...</p>
                    </div>
                </div>
            </div>

            <!-- Right: Agent Logs -->
            <div class="glass-panel activity-panel">
                <span class="section-title"><i class="fa-solid fa-terminal"></i> Agent Intelligence Logs</span>
                <div class="terminal-box" id="agentLogs">
                    <div class="log-entry">
                        <span class="log-time">[16:52:16]</span>
                        <span class="log-agent">SYSTEM:</span>
                        <span class="log-msg">Initialization complete. All agents standby.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
