version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-network
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai-network
    restart: always

  redis:
    image: redis:alpine
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

networks:
  ai-network:
    driver: bridge

volumes:
  redis_data:
  uploads_data:
