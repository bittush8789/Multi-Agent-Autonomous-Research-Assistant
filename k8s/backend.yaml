apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  namespace: research-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      containers:
      - name: backend
        image: bittush8789/research-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: ai-secrets
        - configMapRef:
            name: ai-config
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-backend-svc
  namespace: research-assistant
spec:
  selector:
    app: ai-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
